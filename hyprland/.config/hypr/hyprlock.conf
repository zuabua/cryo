general {
    hide_cursor = true
    grace = 0
    immediate_render = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# Identity row
label {
    monitor =
    text = cmd[update:0] echo "<b>$USER</b>@$(hostname)"
    color = rgba(165, 173, 206, 0.85)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, -60
    halign = center
    valign = top
} 

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date + '$%H:%M')"
    color = rgb(c6d0f5)
    font_size = 128
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 290
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(94, 234, 212, 0.25)
    shadow_boost = 1.4
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date + '%A, %d %B')"
    color = rgb(a5adce)
    font_size = 16
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 170
    halign = center
    valign = center
}


# Simple password input
input-field {
    monitor =
    size = 380, 54
    position = 0, -50
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.30
    dots_center = true
    dots_rounding = -1

    outer_color = rgb(5eead4)
    inner_color = rgba(65, 69, 89, 0.65)
    font_color = rgb(c6d0f5)
    fade_on_empty = false
    rounding = 12
    placeholder_text = <span foreground="##a5adce" font_family="JetBrainsMono Nerd Font Mono">Enter password</span>
    hide_input = false

    check_color = rgb(818cf8)
    fail_color = rgb(f87171)
    fail_text = <span foreground="##f87171">Wrong Password</span>
    capslock_color = rgb(f87171)

    shadow_passes = 4
    shadow_size = 14
    shadow_color = rgba(94, 234, 212, 0.35)
    shadow_boost = 1.6
}
