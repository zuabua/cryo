bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod,       V, exec, ~/.local/bin/clip-picker
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, F12, exec, ~/.config/hypr/gamemode.sh
bind = $mainMod, W, exec, waypaper
bind = $mainMod, T, exec, ~/.config/waybar/htb-toggle.sh
bind = $mainMod, SPACE, exec, ~/.config/quickshell/inbox-toggle.sh
bind = $mainMod, period, exec, bemoji -t
bind = $mainMod SHIFT, P, exec, ~/.local/bin/pomodoro toggle
bind = $mainMod SHIFT, W, exec, ~/.config/quickshell/barctl-toggle.sh
bind = $mainMod, F1, exec, ~/.config/quickshell/keybinds-toggle.sh
bind = , F12, togglespecialworkspace, scratchpad
bind = CTRL ALT, L, exec, pidof hyprlock || hyprlock

# HTB Binds
bind = $mainMod, I, exec, sh -c 'ip=$("$HOME/.local/bin/htb-target" ip 2>/dev/null); if [ -n "$ip" ]; then printf %s "$ip" | wl-copy; notify-send -t 1500 "Target IP" "$ip"; else notify-send -t 1500 "No active HTB target"; fi'
bind = $mainMod SHIFT, I, exec, sh -c 'ip=$(ip -4 addr show tun0 2>/dev/null | grep -oE "inet [0-9.]+" | head -n1 | cut -d" " -f2); if [ -n "$ip" ]; then printf %s "$ip" | wl-copy; notify-send -t 1500 "tun0 IP" "$ip"; else notify-send -t 1500 "tun0 down" "Bring HTB VPN up first"; fi'
bind = $mainMod SHIFT, S, exec, $HOME/.local/bin/revshell

bind = $mainMod, B, workspace, previous
bind = $mainMod, G, centerwindow,
bind = $mainMod SHIFT, G, pin,

# Some picker tools
bind = $mainMod SHIFT, C, exec, sh -c 'hex=$(hyprpicker -f hex 2>/dev/null); if [ -n "$hex" ]; then printf %s "$hex" | wl-copy; notify-send -t 1500 "Color picked" "$hex"; fi'
bind = $mainMod SHIFT, O, exec, sh -c 'r=$(slurp 2>/dev/null) || exit 0; text=$(grim -g "$r" - | tesseract - - 2>/dev/null); if [ -n "$text" ]; then printf %s "$text" | wl-copy; notify-send -t 1800 "OCR text copied" "$(printf %s "$text" | head -c 80)"; else notify-send -t 1500 "OCR" "no text recognized"; fi'
bind = $mainMod CTRL, P, exec, sh -c 'mkdir -p "$HOME/Pictures/screenshots"; r=$(slurp 2>/dev/null) || exit 0; f="$HOME/Pictures/screenshots/$(date +%F-%H%M%S).png"; grim -g "$r" "$f" && notify-send -t 1800 "Screenshot saved" "$f"'

# Session controls
bind = $mainMod, N, exec, sh -c 'if [ "$(dunstctl is-paused)" = "false" ]; then notify-send -t 1500 "DND on" "Notifications paused"; sleep 0.15; dunstctl set-paused true; else dunstctl set-paused false; notify-send -t 1500 "DND off" "Notifications resumed"; fi'
bind = $mainMod SHIFT, M, exec, $HOME/.local/bin/power-menu

# Window focus
bind = $mainMod, h,     movefocus, l
bind = $mainMod, j,     movefocus, d
bind = $mainMod, k,     movefocus, u
bind = $mainMod, l,     movefocus, r
bind = $mainMod, Left,  movefocus, l
bind = $mainMod, Down,  movefocus, d
bind = $mainMod, Up,    movefocus, u
bind = $mainMod, Right, movefocus, r

# Window movement
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Window resize
binde = $mainMod CTRL, h,     resizeactive, -40 0
binde = $mainMod CTRL, l,     resizeactive,  40 0
binde = $mainMod CTRL, k,     resizeactive,  0 -40
binde = $mainMod CTRL, j,     resizeactive,  0  40
binde = $mainMod CTRL, Left,  resizeactive, -40 0
binde = $mainMod CTRL, Right, resizeactive,  40 0
binde = $mainMod CTRL, Up,    resizeactive,  0 -40
binde = $mainMod CTRL, Down,  resizeactive,  0  40

# Multi monitor binds
bind = $mainMod,            Tab, focusmonitor,        +1
bind = $mainMod SHIFT,      Tab, movewindow,          mon:+1
bind = $mainMod CTRL,       Tab, movecurrentworkspacetomonitor, +1

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = , Print,     exec, grim - | wl-copy
bind = $mainMod, P, exec, grim -g "$(slurp)" - | wl-copy
