$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = hyprlauncher

# Nvidia specific tweaks
source = ~/.config/hypr/nvidia.conf

source = ~/.config/hypr/binds.conf

layerrule = match:namespace ^(waybar)$,        blur 1, ignore_alpha 0.2
layerrule = match:namespace ^(quickshell)$,    blur 1, ignore_alpha 0.2
layerrule = match:namespace ^(notifications)$, blur 1, ignore_alpha 0.2    # dunst
layerrule = match:namespace ^(wofi)$,          blur 1, ignore_alpha 0.2

windowrule = opacity 1.0 override 1.0 override, match:class ^(firefox)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(mpv)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(vlc)$

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border   = rgba(5eead4cc) rgba(818cf8cc) 45deg
    col.inactive_border = rgba(41455988)
    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 4
    active_opacity     = 0.95
    inactive_opacity   = 0.88
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = true

    bezier = overshoot,   0.05, 0.9,  0.1, 1.1
    bezier = softSpring,  0.34, 1.56, 0.64, 1.0
    bezier = expoOut,     0.16, 1.0,  0.3, 1.0
    bezier = smoothInOut, 0.45, 0.05, 0.55, 0.95

    animation = windowsIn,        1, 2,  overshoot,   popin 85%
    animation = windowsOut,       1, 1,  expoOut,     popin 90%
    animation = windowsMove,      1, 2,  softSpring

    animation = fade,             1, 2,  expoOut
    animation = fadeShadow,       1, 2,  expoOut
    animation = fadeDim,          1, 3,  smoothInOut

    animation = border,           1, 3,  smoothInOut

    animation = workspaces,       0
    animation = specialWorkspace, 1, 2,  overshoot,    slidefadevert -50%

    animation = layers,           1, 1,  expoOut,      fade
    animation = layersIn,         1, 1,  expoOut,      fade
    animation = layersOut,        1, 1,  expoOut,      fade
}

# Monitor setup
source = ~/.config/hypr/monitors.conf

# Workspaces setup
source = ~/.config/hypr/workspaces.conf

misc {
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
    vrr                          = 2
    focus_on_activate            = true
}

dwindle {
    preserve_split = true
    smart_resizing = true
}

input {
	kb_layout = dk

  sensitivity = -0
  accel_profile = flat
  follow_mouse = 1
}
